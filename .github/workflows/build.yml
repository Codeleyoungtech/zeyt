name: 'build'

on:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Zeyt
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Zeyt v__VERSION__'
          releaseBody: |
            ### Welcome to Zeyt v0.1.1
            Zeyt is a fast, GPU-optional, lightweight terminal built with Tauri, React, and Rust, heavily optimized for local productivity and agentic workflows.
            
            #### What's New in this Release:
            - **CLI Launch Path Resolution:** Running `zeyt /path/to/project` instantly opens Zeyt with a workspace focused on that path.
            - **Smart Ctrl+C:** Hitting `Ctrl+C` will now intuitively copy text if you have an active selection. If nothing is selected, it falls back to the native UNIX interrupt signal.
            - **Directory-Scoped Autosuggest:** Intelligent ghost-text command suggestions powered by a fast SQLite Rust backend that scopes suggestions to your current working directory.
            - **Font Ligatures:** Full support for code ligatures (`=>`, `!=`, etc.) for beautiful output in JetBrains Mono or Cascadia Code.
            - **Agent Task Notifications:** Desktop OS notifications natively pipe in when long-running background tasks exit.
            
            #### Known Limitations
            - **macOS Users:** The macOS `.app` bundle and `.dmg` in this release are currently unsigned. On first launch, macOS Gatekeeper will block it. You must **Right-click → Open** the application the first time to bypass the warning, or allow it via System Settings.
            - Please report any other issues on GitHub!
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
